<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}Optimization Expert</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="author" content="Optimization Expert" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="{{ page.url | absolute_url }}" />

  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
  <meta property="og:title" content="{{ page.title | default: site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:locale" content="fa_IR" />
  {% if page.image %}<meta property="og:image" content="{{ page.image | absolute_url }}" />{% endif %}

  <meta name="twitter:card" content="{% if page.image %}summary_large_image{% else %}summary{% endif %}" />
  <meta name="twitter:title" content="{{ page.title | default: site.title }}" />
  <meta name="twitter:description" content="{{ page.description | default: site.description }}" />
  {% if page.image %}<meta name="twitter:image" content="{{ page.image | absolute_url }}" />{% endif %}

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap');

    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #5f6b7a;
      --primary: #174ea6;
      --primary-2: #0b57d0;
      --accent: #00a884;
      --border: #e5e9f2;
      --shadow: 0 18px 45px rgba(23, 32, 51, 0.08);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Vazirmatn", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(23, 78, 166, 0.12), transparent 32rem),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.9;
    }

    a { color: inherit; text-decoration: none; }

    .container { width: min(900px, calc(100% - 32px)); margin: 0 auto; }

    header {
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(18px);
      background: rgba(255, 255, 255, 0.78);
      border-bottom: 1px solid rgba(229, 233, 242, 0.8);
    }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; gap: 18px;
      width: min(1120px, calc(100% - 32px)); margin: 0 auto;
    }

    .brand { font-weight: 800; color: var(--primary); letter-spacing: -0.3px; font-size: 1.08rem; }
    .nav-links { display: flex; align-items: center; gap: 18px; font-size: 0.95rem; color: var(--muted); flex-wrap: wrap; }
    .nav-links a:hover { color: var(--primary); }

    main { padding: 48px 0; }

    .page-title { font-size: clamp(1.8rem, 4vw, 2.8rem); letter-spacing: -0.8px; margin: 0 0 8px; }
    .page-sub { color: var(--muted); margin: 0 0 32px; }

    /* فهرست پست‌ها */
    .post-list { display: grid; gap: 16px; margin: 0; padding: 0; list-style: none; }
    .post-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px 24px;
      box-shadow: 0 12px 34px rgba(23, 32, 51, 0.06);
      transition: transform 0.2s ease;
    }
    .post-card:hover { transform: translateY(-3px); }
    .post-card h3 { margin: 0 0 6px; color: var(--primary); font-size: 1.25rem; }
    .post-date { color: var(--muted); font-size: 0.85rem; margin: 0 0 10px; }
    .post-excerpt { color: var(--muted); margin: 0; }

    /* صفحه یک پست */
    article.post {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 34px 36px;
      box-shadow: var(--shadow);
    }
    article.post h1 { color: var(--primary); font-size: clamp(1.6rem, 4vw, 2.4rem); margin: 0 0 8px; }
    article.post h2 { font-size: 1.4rem; margin: 28px 0 10px; }
    article.post h3 { font-size: 1.15rem; margin: 22px 0 8px; }
    article.post p { color: var(--text); }
    article.post ul, article.post ol { padding-right: 22px; color: var(--text); }
    article.post li { margin-bottom: 6px; }
    article.post img { display: block; max-width: 100%; height: auto; margin: 20px auto; border-radius: 16px; }
    article.post pre {
      background: #0f1b2d; color: #e6edf7; padding: 16px 18px;
      border-radius: 14px; overflow-x: auto; direction: ltr; text-align: left;
    }
    article.post code { font-family: "Cascadia Code", Consolas, monospace; direction: ltr; }
    article.post blockquote {
      border-right: 4px solid var(--accent); margin: 18px 0;
      padding: 4px 16px; background: #f3fbf8; color: var(--muted); border-radius: 10px;
    }

    .back-link { display: inline-block; margin-top: 24px; color: var(--primary); font-weight: 700; }

    footer { padding: 36px 0; color: var(--muted); text-align: center; font-size: 0.92rem; }

    @media (max-width: 820px) {
      nav { align-items: start; flex-direction: column; }
      article.post { padding: 24px 22px; }
    }
  </style>
</head>
<body>
  <header>
    <nav aria-label="ناوبری اصلی">
      <a class="brand" href="/">Optimization Expert</a>
      <div class="nav-links">
        <a href="/#courses">دوره‌ها</a>
        <a href="/#path">مسیر یادگیری</a>
        <a href="/blog/">یادداشت‌ها</a>
        <a href="/#contact">ثبت‌نام و تماس</a>
      </div>
    </nav>
  </header>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer>
    <div class="container">
      © <span id="year"></span> Optimization Expert — دوره‌های تخصصی بهینه‌سازی
    </div>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
